<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Карта кожи по методу Миловской</title>
<script src="https://telegram.org/js/telegram-web-app.js" async></script>
<!-- шрифты: системный стек, без внешних запросов -->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --gold: #C8A882; --gold-h: #B8966E;
  --black: #111111; --gray: #6B6B6B;
  --gray-light: #F5F5F5; --border: #E5E5E5;
  --white: #FFFFFF; --r: 16px; --r-sm: 12px;
  --sb: env(safe-area-inset-bottom, 0px);
  --st: env(safe-area-inset-top, 0px);
}
html { background:#FFFFFF !important; }
body {
  background:#FFFFFF !important; color:var(--black) !important;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  min-height:100vh;
}
#app {
  display:flex; flex-direction:column;
  min-height:100vh;
  height:100dvh;
  background:#FFFFFF; max-width:480px; margin:0 auto; overflow:hidden;
}

/* TOP BAR */
.top-bar {
  flex-shrink:0; padding:10px 20px 6px;
  padding-top:max(10px,var(--st));
  background:#FFFFFF; display:flex; align-items:center; gap:10px;
}
.pb-outer { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.pb-inner { height:100%; background:var(--black); border-radius:2px; transition:width 0.35s ease; }
.step-txt { font-size:12px; font-weight:600; color:var(--gray); white-space:nowrap; min-width:40px; text-align:right; }

/* SCROLL */
.content {
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch; padding:0 20px 20px;
  overscroll-behavior:contain;
}
.content::-webkit-scrollbar { display:none; }

/* BOTTOM */
.bottom {
  flex-shrink:0; padding:12px 20px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom, 0px));
  background:#FFFFFF; border-top:1px solid var(--border);
  display:flex; flex-direction:column; gap:8px;
  position:sticky; bottom:0; z-index:10;
}

/* BUTTONS */
.btn {
  width:100%; padding:15px 20px; border:none; border-radius:var(--r-sm);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif; font-size:15px; font-weight:600;
  cursor:pointer; text-align:center; text-decoration:none; display:block;
  transition:opacity 0.15s,transform 0.1s; letter-spacing:0.1px;
}
.btn:active:not(:disabled) { opacity:0.82; transform:scale(0.98); }
.btn-black { background:var(--black); color:#fff; }
.btn-gold  { background:var(--gold);  color:#fff; }
.btn-outline { background:transparent; color:var(--gray); border:1.5px solid var(--border); font-weight:500; }
.btn:disabled { background:#D0D0D0; color:#fff; cursor:not-allowed; }

/* WELCOME */
.logo-wrap { text-align:center; padding:28px 0 16px; }
.logo-img { width:110px; height:110px; object-fit:contain; display:block; margin:0 auto; }
.logo-fallback { font-size:72px; line-height:1; }
.logo-emoji { font-size:88px; line-height:1; text-align:center; }
.welcome-title { font-size:24px; font-weight:700; line-height:1.25; color:var(--black); text-align:center; margin-bottom:8px; }
.welcome-by { font-size:13px; color:var(--gray); text-align:center; line-height:1.5; margin-bottom:20px; }
.stats-row { display:flex; justify-content:center; gap:32px; margin-bottom:24px; }
.stat-item { text-align:center; }
.stat-num { font-size:24px; font-weight:700; color:var(--black); }
.stat-lbl { font-size:11px; color:var(--gray); margin-top:2px; font-weight:500; }
.divider { height:1px; background:var(--border); margin:0 0 20px; }
.notice { background:var(--gray-light); border-radius:var(--r-sm); padding:14px 16px; font-size:13px; color:#444; line-height:1.6; margin-bottom:14px; }
.notice strong { color:var(--black); }

/* CONSENT */
.consent-row {
  display:flex; align-items:flex-start; gap:12px;
  padding:14px 16px; background:var(--white);
  border:1.5px solid var(--border); border-radius:var(--r-sm);
  cursor:pointer; transition:border-color 0.15s,background 0.15s;
  user-select:none; margin-bottom:6px;
}
.consent-row.active { border-color:var(--black); background:var(--gray-light); }
.check-box {
  width:22px; height:22px; border:2px solid var(--border); border-radius:6px;
  flex-shrink:0; margin-top:1px; background:var(--white);
  display:flex; align-items:center; justify-content:center; transition:all 0.15s;
}
.consent-row.active .check-box { background:var(--black); border-color:var(--black); }
.check-mark { color:white; font-size:13px; font-weight:700; display:none; }
.consent-row.active .check-mark { display:block; }
.consent-txt { font-size:13px; color:var(--black); line-height:1.55; }
.consent-link { color:var(--gold-h); text-decoration:underline; }
.err-hint { font-size:12px; color:#CC3333; margin-top:2px; display:none; }
.err-hint.show { display:block; }

/* NAME SCREEN */
.name-screen { padding-top:24px; }
.ns-emoji { font-size:56px; display:block; text-align:center; margin-bottom:16px; }
.ns-title { font-size:22px; font-weight:700; text-align:center; color:var(--black); margin-bottom:8px; line-height:1.3; }
.ns-sub { font-size:14px; color:var(--gray); text-align:center; margin-bottom:28px; line-height:1.5; }
.input-field {
  width:100%; padding:16px; border:1.5px solid var(--border);
  border-radius:var(--r-sm); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  font-size:16px; color:var(--black); background:var(--white);
  outline:none; transition:border-color 0.15s;
  -webkit-appearance:none;
}
.input-field:focus { border-color:var(--black); }
.input-field::placeholder { color:#BBBBBB; }
.input-label { font-size:12px; font-weight:600; color:var(--gray); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:8px; display:block; }

/* AGE SCREEN */
.age-opts { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
.age-opt {
  display:flex; align-items:center; gap:14px;
  padding:16px; border:1.5px solid var(--border);
  border-radius:var(--r-sm); cursor:pointer;
  transition:border-color 0.15s,background 0.15s,transform 0.1s;
  font-size:15px; font-weight:500; color:var(--black);
}
.age-opt:active { transform:scale(0.98); }
.age-opt.sel { border-color:var(--black); background:var(--gray-light); }
.age-radio {
  width:22px; height:22px; border:2px solid var(--border);
  border-radius:50%; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; background:var(--white);
}
.age-opt.sel .age-radio { border-color:var(--black); background:var(--black); }
.age-opt.sel .age-radio::after { content:''; width:8px; height:8px; background:#fff; border-radius:50%; }

/* QUESTION */
.q-card { background:var(--white); border:1px solid var(--border); border-radius:var(--r); padding:22px 18px 18px; margin-bottom:12px; margin-top:8px; }
.q-emoji { font-size:44px; display:block; margin-bottom:12px; line-height:1; }
.q-title { font-size:19px; font-weight:700; line-height:1.35; color:var(--black); margin-bottom:5px; }
.q-hint { font-size:13px; color:var(--gray); line-height:1.5; }
.opts { display:flex; flex-direction:column; gap:8px; margin-bottom:4px; }
.opt {
  display:flex; align-items:center; gap:12px; padding:13px 16px;
  border:1.5px solid var(--border); border-radius:var(--r-sm);
  cursor:pointer; font-size:14px; color:var(--black); line-height:1.45;
  background:var(--white); transition:border-color 0.15s,background 0.15s,transform 0.1s; font-weight:400;
}
.opt:active { transform:scale(0.985); }
.opt.sel { border-color:var(--black); background:var(--gray-light); }
.opt-dot {
  width:20px; height:20px; border:2px solid var(--border); border-radius:50%;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; background:var(--white);
}
.opt.sel .opt-dot { border-color:var(--black); background:var(--black); }
.opt.sel .opt-dot::after { content:''; width:7px; height:7px; background:white; border-radius:50%; }

/* LOADING */
.loading-full {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; height:100dvh; background:#FFFFFF !important; text-align:center; padding:40px;
}

@keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.05)} }
.loading-title { font-size:22px; font-weight:700; color:var(--black); margin-bottom:8px; }
.loading-sub { font-size:14px; color:var(--gray); }

/* RESULT */
.result-top { text-align:center; padding:24px 0 18px; border-bottom:1px solid var(--border); margin-bottom:16px; }
.res-emoji { font-size:60px; display:block; margin-bottom:10px; }
.res-tag { display:inline-block; font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray); background:var(--gray-light); padding:4px 12px; border-radius:20px; margin-bottom:10px; }
.res-name { font-size:26px; font-weight:700; color:var(--black); margin-bottom:8px; line-height:1.2; }
.res-desc { font-size:14px; color:var(--gray); line-height:1.65; }
.section-label { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gray); margin-bottom:10px; }
.trait-list { margin-bottom:16px; }
.trait-line { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:14px; color:var(--black); line-height:1.5; }
.trait-line:last-child { border-bottom:none; }
.tdot { width:5px; height:5px; background:var(--gold); border-radius:50%; margin-top:7px; flex-shrink:0; }
.rec-box { border:1px solid var(--border); border-radius:var(--r); padding:18px; margin-bottom:12px; }
.rec-head { font-size:10px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
.rec-body { font-size:14px; color:var(--black); line-height:1.65; }
.warn-box { background:#FFF8EC; border-radius:var(--r-sm); padding:13px 15px; font-size:13px; color:#7A4F00; line-height:1.55; margin-bottom:12px; border-left:3px solid var(--gold); }
.fine-print { font-size:11px; color:#AAAAAA; text-align:center; line-height:1.5; padding-bottom:4px; }

/* DOCTOR */
.doctor-section { text-align:center; padding-top:20px; }
.doc-avatar-ph { width:96px; height:96px; border-radius:50%; background:var(--gray-light); border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:44px; margin:0 auto 14px; }
.doc-name { font-size:21px; font-weight:700; color:var(--black); margin-bottom:4px; }
.doc-pos { font-size:13px; color:var(--gray); margin-bottom:20px; line-height:1.5; }
.info-card { border:1px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:16px; }
.info-line { display:flex; align-items:center; gap:12px; padding:13px 16px; font-size:14px; color:var(--black); border-bottom:1px solid var(--border); }
.info-line:last-child { border-bottom:none; }
.info-ic { font-size:18px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── INIT ──
// Puzzle Bot совместимость
const tg = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : {
  ready:()=>{}, expand:()=>{}, setHeaderColor:()=>{}, setBackgroundColor:()=>{},
  enableClosingConfirmation:()=>{}, sendData:()=>{},
  initDataUnsafe:{user:{first_name:''}},
  BackButton:{ show:()=>{}, hide:()=>{}, onClick:()=>{}, offClick:()=>{} },
  MainButton:{ show:()=>{}, hide:()=>{}, setText:()=>{}, onClick:()=>{} }
};
try { tg.ready(); } catch(e){}
try { tg.setHeaderColor('#FFFFFF'); } catch(e){}
try { tg.setBackgroundColor('#FFFFFF'); } catch(e){}
try { tg.expand(); } catch(e){}
document.documentElement.style.background = '#FFFFFF';
document.body.style.background = '#FFFFFF';

const tgName = (tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) ? tg.initDataUnsafe.user.first_name : '';
// Логотип: emoji 🐋 (логотип встроен)

const AGE_GROUPS = [
  { label: '18–25 лет', value: '18-25' },
  { label: '26–35 лет', value: '26-35' },
  { label: '36–45 лет', value: '36-45' },
  { label: '46–55 лет', value: '46-55' },
  { label: '56 лет и старше', value: '56+' },
];

const Q = [
  { emoji:"🪞", title:"Как ведёт себя Ваша кожа после умывания?", hint:"Без нанесения средств, первые 10 минут",
    opts:[{t:"Сильно стягивает, ощущение «картонки»",s:{K1:3,K5:1}},{t:"Немного стягивает, через 20 минут проходит",s:{K1:1,K6:1}},{t:"Комфортно, никаких ощущений",s:{K6:1,K3:1}},{t:"Краснеет или появляется жжение",s:{K4:3}},{t:"Отекает, особенно под глазами",s:{K2:3}}]},
  { emoji:"☀️", title:"Как реагирует Ваша кожа на солнце?", hint:"Без SPF-защиты",
    opts:[{t:"Загорает равномерно, редко краснею",s:{K5:1,K6:1}},{t:"Появляются пятна или неровный тон после загара",s:{K3:3}},{t:"Краснею, иногда высыпания",s:{K4:3}},{t:"Кожа сохнет и шелушится",s:{K1:2,K5:1}},{t:"Отекаю или краснею под солнцем",s:{K2:2}}]},
  { emoji:"🌆", title:"Что происходит с кожей к вечеру?", hint:"Через 8–10 часов после утреннего ухода",
    opts:[{t:"Блестит T-зона, остальное в норме",s:{K6:3}},{t:"Лицо выглядит уставшим и отёчным",s:{K2:3}},{t:"Тусклая, обезвоженная, хочется умыться",s:{K1:2,K5:2}},{t:"Появляются покраснения или дискомфорт",s:{K4:2}},{t:"Пятна и неровности становятся заметнее",s:{K3:2}}]},
  { emoji:"🧴", title:"Как кожа реагирует на новые средства?", hint:"Первые 2–3 дня применения",
    opts:[{t:"Краснею, жжёт, иногда высыпает",s:{K4:3}},{t:"Изредка небольшая реакция, потом привыкаю",s:{K6:1,K3:1}},{t:"Кремы не работают, кожа остаётся сухой",s:{K1:2}},{t:"Нормально, очень редко бывают реакции",s:{K5:1,K6:1}},{t:"Лицо может отекать от некоторых средств",s:{K2:2}}]},
  { emoji:"🔍", title:"Главная проблема Вашей кожи — это...", hint:"Выберите то, что беспокоит больше всего",
    opts:[{t:"Постоянная сухость и стянутость",s:{K1:3}},{t:"Отёки, мешки под глазами, лицо «плывёт»",s:{K2:3}},{t:"Пятна и неровный тон",s:{K3:3}},{t:"Покраснения и чувствительность",s:{K4:3}},{t:"Морщины, потеря упругости и овала",s:{K5:3}},{t:"Жирный блеск и сухость одновременно",s:{K6:3}}]},
  { emoji:"🌅", title:"Как выглядит Ваша кожа утром после сна?", hint:"Сразу после пробуждения",
    opts:[{t:"Отёчная, следы от подушки долго не проходят",s:{K2:3}},{t:"Сухая, тусклая, нужно «раскачиваться»",s:{K1:2,K5:1}},{t:"Пятна утром заметнее, чем вечером",s:{K3:2}},{t:"Покраснения, иногда высыпания",s:{K4:2}},{t:"T-зона блестит, остальное ок",s:{K6:2}},{t:"В целом нормально",s:{K5:1,K6:1}}]},
  { emoji:"🍷", title:"Что чаще всего ухудшает Вашу кожу?", hint:"Один или несколько факторов",
    opts:[{t:"Стресс и усталость",s:{K1:2,K4:1}},{t:"Солёная еда, алкоголь, мало движения",s:{K2:3}},{t:"Солнце и гормональные изменения",s:{K3:3}},{t:"Холод, ветер, острое, новая косметика",s:{K4:3}},{t:"Возраст — всё медленнее обновляется",s:{K5:3}},{t:"Гормональные перепады, цикл",s:{K6:2,K3:1}}]},
  { emoji:"💦", title:"Как Ваша кожа удерживает увлажнение?", hint:"После нанесения крема или сыворотки",

  { emoji:"👁️", title:"Что происходит с зоной вокруг глаз?", hint:"Состояние без макияжа",
    opts:[{t:"Мелкие морщинки, сухость, шелушение",s:{K1:2,K5:2}},{t:"Постоянные мешки и тёмные круги",s:{K2:3}},{t:"Пигментные пятна под глазами",s:{K3:2}},{t:"Отекает и краснеет периодически",s:{K4:2}},{t:"Глубокие морщины, птоз, потеря упругости",s:{K5:2}},{t:"Всё в норме",s:{K6:1}}]},
  { emoji:"🔬", title:"Одним словом Ваша кожа — это...", hint:"Самое точное описание",
    opts:[{t:"Истощённая — всегда хочет большего",s:{K1:3}},{t:"Уставшая — особенно лицо «плывёт»",s:{K2:3}},{t:"Пятнистая — тон неровный",s:{K3:3}},{t:"Капризная — всё замечает и реагирует",s:{K4:3}},{t:"Зрелая — хочет другого подхода",s:{K5:3}},{t:"Непредсказуемая — разная в разных зонах",s:{K6:3}}]}
];

const A = {
  K1:{name:"Истощённая кожа",emoji:"🌿",desc:"Ваша кожа много работала — и устала. Она теряет влагу быстрее, чем успевает восполнить, барьер истончён, и любой внешний раздражитель ощущается острее обычного.",traits:["Стянутость после умывания, ощущение «картонки»","Кремы впитываются мгновенно и «не работают»","Ранние мимические морщины в зонах сухости","Склонность к шелушению"],rec:"Начинаем с барьера — и только потом всё остальное. Деликатный уход без агрессии, без кислот, без пилингов. Сначала — восстановить.",warn:null},
  K2:{name:"Отёчная кожа",emoji:"💧",desc:"Ваша кожа задерживает воду, токсины, усталость. Утром лицо «плывёт», к обеду немного спадает, но к вечеру снова тяжесть и опухлость.",traits:["Отёки утром, особенно под глазами и по овалу","Постоянный «мятый» вид лица после сна","Ощущение тяжести и сдавленности","Склонность к пористости и расширенным порам"],rec:"Работаем с дренажем и микроциркуляцией. Часто причина в образе жизни — и это можно изменить. Ирина подберёт персональный протокол.",warn:null},
  K3:{name:"Пигментная кожа",emoji:"🌑",desc:"Ваша кожа — это история солнца, воспалений и гормональных изменений, отражённых в неровном тоне. Меланоциты работают активно, часто со сбоями.",traits:["Пятна после прыщей, ссадин, раздражений","Гиперпигментация — неровный оттенок","Мелазма на фоне гормональных изменений","Неравномерная реакция на солнце"],rec:"SPF — это основа, не опция. Дальше — работа с причиной: гормоны, воспаление, осветляющие активы. Всё поэтапно.",warn:null},

// ── STATE ──
// screens: welcome | name | age | quiz | loading | result | cta
let S = {
  screen:'welcome',
  userName:'', ageGroup:'', ageIdx:null,
  qi:0, scores:{K1:0,K2:0,K3:0,K4:0,K5:0,K6:0},
  answers:[], sel:null, result:null,
  consent:false, cerr:false, nerr:false, consent2:false, cerr2:false
};

// Общее число шагов для прогресс-бара: name(1) + age(1) + 10 вопросов = 12
const TOTAL_STEPS = 12;

function stepIndex() {
  if(S.screen==='name') return 1;
  if(S.screen==='age')  return 2;
  if(S.screen==='quiz') return 3 + S.qi;
  return 0;
}

// ── RENDER ──
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if(S.screen==='loading'){ app.innerHTML=renderLoading(); updateBack(); return; }

  const showBar = ['name','age','quiz'].includes(S.screen);
  let header = '';
  if(showBar) {
    const si = stepIndex();
    const pct = Math.round(si / TOTAL_STEPS * 100);
    header = `<div class="top-bar">
      <div class="pb-outer"><div class="pb-inner" style="width:${pct}%"></div></div>
      <div class="step-txt">${si} / ${TOTAL_STEPS}</div>
    </div>`;
  }

  let body='', foot='';
  if(S.screen==='welcome'){ body=bWelcome(); foot=fWelcome(); }
  if(S.screen==='name')   { body=bName();    foot=fName();    }
  if(S.screen==='age')    { body=bAge();     foot=fAge();     }
  if(S.screen==='quiz')   { body=bQuiz();    foot=fQuiz();    }
  if(S.screen==='pdscreen'){ body=bPDScreen(); foot=fPDScreen(); }
  if(S.screen==='result') { body=bResult();  foot=fResult();  }
  if(S.screen==='cta')    { body=bCTA();     foot=fCTA();     }

  app.innerHTML = `${header}<div class="content">${body}</div><div class="bottom">${foot}</div>`;
  updateBack();
  bind();
}

// ── СОГЛАСИЕ НА ОБР. ДАННЫХ (после теста) ──

      <p class="ns-sub" style="margin-bottom:24px">Обязательное поле</p>
      <div id="cr2" class="consent-row${S.consent2?' active':''}" style="text-align:left">
        <div class="check-box"><span class="check-mark">✓</span></div>
        <div class="consent-txt">Даю согласие на обработку персональных данных. Нажимая на чекбокс, вы соглашаетесь с <a class="consent-link" href="https://t.me/MilovskayaDR" target="_blank" onclick="event.stopPropagation()">политикой обработки персональных данных</a></div>
      </div>
      <div id="cerr2" class="err-hint${S.cerr2?' show':''}" style="margin-top:6px">Необходимо подтвердить согласие</div>
    </div>`;
}
function fPDScreen() {
  return `
    <button class="btn btn-black" onclick="submitPD()">Далее →</button>
    <button class="btn btn-outline" onclick="goBack()">← Назад</button>`;
}
function submitPD() {
  if(!S.consent2){ S.cerr2=true; render(); return; }
  S.screen='result'; render();
}

// ── RESULT ──
function bResult() {

  return `
    <button class="btn btn-gold" onclick="goCTA()">✍️ Записаться к Ирине</button>

}
function fCTA() {
  return `
    <a href="https://t.me/MilovskayaDR" class="btn btn-black">✍️ Написать Ирине лично</a>
    <a href="https://t.me/fgf_medical" class="btn btn-outline">📞 Написать в FGF Medical</a>
    <button class="btn btn-outline" onclick="S.screen='result';render()">← Мой результат</button>`;
}

// ── BIND ──
function bind() {
  document.querySelectorAll('.opt').forEach(el=>{
    el.addEventListener('click',()=>{ S.sel=+el.dataset.i; render(); });
  });
  document.querySelectorAll('.age-opt').forEach(el=>{
    el.addEventListener('click',()=>{ S.ageIdx=+el.dataset.ai; S.ageGroup=AGE_GROUPS[S.ageIdx].value; render(); });
  });
  const cr = document.getElementById('cr');
  if(cr) cr.addEventListener('click',()=>{ S.consent=!S.consent; S.cerr=false; render(); });
  const cr2 = document.getElementById('cr2');
  if(cr2) cr2.addEventListener('click',()=>{ S.consent2=!S.consent2; S.cerr2=false; render(); });
  const ni = document.getElementById('nameInput');
  if(ni) {
    ni.addEventListener('input',()=>{ S.userName=ni.value.trim(); S.nerr=false; });
    ni.addEventListener('focus',()=>{ setTimeout(()=>{ ni.scrollIntoView({block:'center',behavior:'smooth'}); },300); });
    setTimeout(()=>ni.focus(), 100);
  }
}

// ── LOGIC ──
function startFlow() {
  if(!S.consent){ S.cerr=true; render(); return; }
  S.screen='name'; render();
}
function submitName() {
  if(!S.userName || S.userName.length < 2){ S.nerr=true; render(); return; }
  S.screen='age'; render();
}
function submitAge() {
  if(S.ageIdx===null) return;
  S.screen='quiz'; render();
}
function nextQ() {
  if(S.sel===null) return;
  const o=Q[S.qi].opts[S.sel];
  for(const[k,v] of Object.entries(o.s)) S.scores[k]+=v;
  S.answers.push(S.sel); S.sel=null;
  if(S.qi<Q.length-1){ S.qi++; render(); }
  else { S.screen='loading'; render(); setTimeout(calcResult,2200); }
}
function goBack() {
  if(S.screen==='name')  { S.screen='welcome'; render(); return; }
  if(S.screen==='age')   { S.screen='name';    render(); return; }
  if(S.screen==='quiz') {
    if(S.qi>0) {
      const last=S.answers.pop();
      if(last!==undefined){ const o=Q[S.qi-1].opts[last]; for(const[k,v] of Object.entries(o.s)) S.scores[k]-=v; }
      S.qi--; S.sel=null; render();
    } else { S.screen='age'; render(); }
    return;
  }
  if(S.screen==='pdscreen'){ S.screen='quiz'; S.qi=Q.length-1; S.sel=S.answers[S.answers.length-1]||null; render(); return; }
  if(S.screen==='cta')  { S.screen='result'; render(); }
}
function calcResult() {
  let max=0, win='K1';
  for(const[k,v] of Object.entries(S.scores)) if(v>max){max=v;win=k;}
  S.result=win; S.screen='pdscreen';
  try{
    try { tg.sendData(JSON.stringify({
      archetype:win, archetype_name:A[win].name,
      scores:S.scores, user_name:S.userName,
      age_group:S.ageGroup, quiz_completed:true
    }));
  }catch(e){}
  render();
}
function goCTA(){ S.screen='cta'; render(); }
function reset(){
  S={screen:'welcome',userName:'',ageGroup:'',ageIdx:null,qi:0,
     scores:{K1:0,K2:0,K3:0,K4:0,K5:0,K6:0},answers:[],sel:null,
     result:null,consent:false,cerr:false,nerr:false,consent2:false,cerr2:false};
  render();
}

// ── BACK BUTTON ──
function updateBack() {
  try { if(S.screen==='welcome'){ tg.BackButton.hide(); return; } tg.BackButton.show(); tg.BackButton.onClick(()=>goBack()); } catch(e){}
}

render();
</script>
