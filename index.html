    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 14px;
      border: 2px solid #EBEBEB;
      border-radius: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 14px;
      line-height: 1.45;
      color: var(--dark);
    }
    .option:active { transform: scale(0.98); }
    .option.selected {
      border-color: var(--gold);
      background: #FDF8F3;
    }
    .option-dot {
      width: 20px;
      height: 20px;
      border: 2px solid #CCCCCC;
      border-radius: 50%;

      margin-top: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;

      border-color: var(--gold);
      background: var(--gold);
    }
    .option.selected .option-dot::after {
      content: '';
      width: 8px; height: 8px;
      background: white;
      border-radius: 50%;
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--gold);
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: 0.3px;
      transition: opacity 0.15s;
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary:not(:disabled):active { opacity: 0.85; }
    .btn-secondary {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: var(--text-secondary);
      border: 1.5px solid #E0E0E0;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;

</head>

  const app = document.getElementById('app');
  switch (state.screen) {
    case 'welcome':  app.innerHTML = renderWelcome(); break;
    case 'quiz':     app.innerHTML = renderQuiz(); break;
    case 'loading':  app.innerHTML = renderLoading(); break;
    case 'result':   app.innerHTML = renderResult(); break;
    case 'cta':      app.innerHTML = renderCTA(); break;
  }
  updateBackButton();
}

      <p style="font-size: 14px; color: #666; line-height: 1.6; margin-bottom: 20px;">
        Добро пожаловать${greeting}!<br>
        Авторский образовательный квиз доктора Ирины Миловской — врача-дерматолога, косметолога.
      </p>
      <div class="disclaimer-box" style="text-align:left; margin-bottom:20px;">
        🩺 <strong>Важно:</strong> Этот квиз является авторским образовательным инструментом. Результат даёт <em>ориентировочное</em> представление о Вашем типе кожи и <strong>не является медицинским диагнозом</strong>. Для точного определения состояния кожи необходима очная консультация специалиста.
      </div>
      <button class="btn-primary" onclick="startQuiz()">Начать квиз →</button>
      <p style="font-size:12px; color:#999; margin-top:12px;">10 вопросов · около 3 минут</p>
    </div>
  `;
}

function renderQuiz() {
  const q = QUESTIONS[state.questionIndex];
  const progress = ((state.questionIndex + 1) / QUESTIONS.length) * 100;
  const isLast = state.questionIndex === QUESTIONS.length - 1;

  return `
    <div>
      <div class="progress-wrap">
        <div class="progress-fill" style="width: ${progress}%;"></div>
      </div>
      <div class="card">
        <p class="step-label">Шаг ${state.questionIndex + 1} из ${QUESTIONS.length}</p>
        <span class="emoji-icon">${q.emoji}</span>
        <h2 class="question-title">${q.title}</h2>
        ${q.hint ? `<p class="question-hint">${q.hint}</p>` : ''}
        ${q.options.map((opt, i) => `
          <div class="option ${state.selectedOption === i ? 'selected' : ''}" onclick="selectOption(${i})">
            <div class="option-dot"></div>
            <span>${opt.text}</span>
          </div>
        `).join('')}
      </div>
      <button class="btn-primary" ${state.selectedOption === null ? 'disabled' : ''} onclick="nextQuestion()">
        ${isLast ? 'Узнать результат 🎯' : 'Далее →'}
      </button>
      ${state.questionIndex > 0 ? '<button class="btn-secondary" onclick="prevQuestion()">← Назад</button>' : ''}
    </div>
  `;
}

function renderLoading() {
  return `
    <div class="loading-screen">
      <span class="loading-emoji">🔬</span>
      <h2 style="font-size: 20px; margin-bottom: 8px;">Анализирую Вашу кожу...</h2>
      <p style="color: #888; font-size: 14px;">Составляю Вашу карту кожи 🤍</p>
    </div>
  `;
}

function renderResult() {
  const a = ARCHETYPES[state.result];
  return `
    <div>
      <div class="result-card">
        <div class="result-center">
          <span class="result-emoji">${a.emoji}</span>
          <h2 class="result-title">${a.name}</h2>
          <p class="result-subtitle">Ваш архетип кожи по методу Миловской</p>
        </div>
        <p class="result-desc">${a.desc}</p>
        <p class="traits-label">ЧТО ХАРАКТЕРНО ДЛЯ ВАШЕЙ КОЖИ:</p>
        ${a.traits.map(t => `<div class="trait-item">— ${t}</div>`).join('')}
        ${a.warning ? `<div class="warning-box">${a.warning}</div>` : ''}
        <div class="recommendation-box">
          <p class="rec-label">💬 РЕКОМЕНДАЦИЯ ИРИНЫ</p>
          <p class="rec-text">${a.recommendation}</p>
        </div>
        <div class="disclaimer-box">
          🩺 Данный результат — ориентировочный. Точное определение состояния кожи требует очной консультации специалиста.
        </div>
      </div>
      <button class="btn-primary" onclick="goToCTA()">✍️ Записаться к Ирине</button>
      <button class="btn-secondary" onclick="resetQuiz()">🔄 Пройти квиз заново</button>
    </div>
  `;
}

function renderCTA() {
  return `
    <div style="text-align:center; padding: 16px 0;">
      <div style="font-size: 60px; margin-bottom: 16px;">👩‍⚕️</div>
      <h2 style="font-size: 21px; font-weight: 700; margin-bottom: 8px;">Записаться к Ирине</h2>
      <div class="card" style="text-align:left; margin-bottom:16px;">
        <p style="font-weight:600; margin-bottom:6px;">Ирина Миловская</p>
        <p style="font-size:14px; color:#555; line-height:1.7;">
          Главный врач FGF Medical<br>
          Врач-дерматолог, косметолог<br>
          🏥 Санкт-Петербург<br>
          📅 Чт, Пт, Вс · 10:00–21:00<br>
          📍 Малый пр. В.О., 64
        </p>
      </div>
      <a href="https://t.me/MilovskayaDR"
         style="display:block; padding:15px; background:var(--gold); color:#fff;
                border-radius:12px; text-decoration:none; font-weight:600;
                font-size:16px; margin-bottom:10px;">
        ✍️ Написать Ирине лично
      </a>
      <a href="https://t.me/fgf_medical"
         style="display:block; padding:13px; background:#F0F0F0; color:var(--dark);
                border-radius:12px; text-decoration:none; font-size:14px; margin-bottom:10px;">
        📞 Написать в клинику FGF Medical
      </a>
      <button class="btn-secondary" onclick="state.screen='result'; render();">← Мой результат</button>
    </div>
  `;
}

// ============================================================
// УПРАВЛЕНИЕ
// ============================================================
function startQuiz() {
  state.screen = 'quiz';
  render();
}

function selectOption(index) {
  state.selectedOption = index;
  render();
}

function nextQuestion() {
  if (state.selectedOption === null) return;

  // Записать очки
  const opt = QUESTIONS[state.questionIndex].options[state.selectedOption];
  for (const [key, val] of Object.entries(opt.scores)) {
    state.scores[key] += val;
  }
  state.answers.push(state.selectedOption);
  state.selectedOption = null;

  if (state.questionIndex < QUESTIONS.length - 1) {
    state.questionIndex++;
    render();
  } else {
    // Последний вопрос — показать загрузку
    state.screen = 'loading';
    render();
    setTimeout(calculateResult, 2200);
  }
}

function prevQuestion() {
  if (state.questionIndex > 0) {
    // Отменить очки последнего ответа
    const lastAnswer = state.answers.pop();
    if (lastAnswer !== undefined) {
      const opt = QUESTIONS[state.questionIndex - 1].options[lastAnswer];
      for (const [key, val] of Object.entries(opt.scores)) {
        state.scores[key] -= val;
      }
    }
    state.questionIndex--;
    state.selectedOption = null;
    render();
  }
}

function calculateResult() {
  let maxScore = 0;
  let winner = 'K1';
  for (const [key, val] of Object.entries(state.scores)) {
    if (val > maxScore) { maxScore = val; winner = key; }
  }
  state.result = winner;
  state.screen = 'result';

  // Отправить результат в бота
  try {
    const data = JSON.stringify({
      archetype: winner,
      archetype_name: ARCHETYPES[winner].name,
      scores: state.scores,
      quiz_completed: true
    });
    tg.sendData(data);
  } catch (e) {
    console.log('sendData not available (not in keyboard button context):', e);
  }

  render();
}

function goToCTA() {
  state.screen = 'cta';
  render();
}

function resetQuiz() {
  state = {
    screen: 'welcome',
    questionIndex: 0,
    scores: { K1: 0, K2: 0, K3: 0, K4: 0, K5: 0, K6: 0 },
    answers: [],
    selectedOption: null,
    result: null
  };
  render();
}

// ============================================================
// КНОПКА «НАЗАД» TELEGRAM
// ============================================================
function updateBackButton() {
  if (state.screen === 'welcome') {
    tg.BackButton.hide();
  } else {
    tg.BackButton.show();
    tg.BackButton.onClick(() => {
      if (state.screen === 'quiz' && state.questionIndex > 0) {
        prevQuestion();
      } else if (state.screen === 'quiz' && state.questionIndex === 0) {
        state.screen = 'welcome'; render();
      } else if (state.screen === 'result') {
        state.screen = 'quiz'; render();
      } else if (state.screen === 'cta') {
        state.screen = 'result'; render();
      } else {
        tg.close();
      }
    });
  }
}

// Первый рендер
render();
</script>
</body>
</html>
